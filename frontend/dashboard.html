<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main id="dashboard-view" class="view active">
        <nav class="glass-nav">
            <h1 class="logo">Orbit<span>.</span></h1>
            <button onclick="logout()" class="btn outline-btn">Logout</button>
        </nav>

        <div class="dashboard-grid">
            
            <!-- Left Column: Add Expense & Limits -->
            <div class="col-left">
                <div class="glass-card">
                    <h2>Track Expense</h2>
                    <form id="expense-form" onsubmit="addExpense(event)">
                        <div class="input-group">
                            <label>Amount (Rs.)</label>
                            <input type="number" step="0.01" id="amount" required placeholder="0.00">
                        </div>
                        <div class="input-group">
                            <label>Category</label>
                            <select id="category" required>
                                <option value="Need">Need (Essentials)</option>
                                <option value="Want">Want (Desires)</option>
                                <option value="Invest">Invest (Future)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Note (Optional)</label>
                            <input type="text" id="note" placeholder="What was this for?">
                        </div>
                        <button type="submit" class="btn primary-btn w-full">Add Expense</button>
                    </form>
                </div>

                <div class="glass-card mt-4">
                    <h2>Set Monthly Limit</h2>
                    <form id="limit-form" onsubmit="setLimit(event)">
                        <div class="input-group row-input">
                            <input type="number" id="monthly-limit" required placeholder="Limit (Rs.)">
                            <button type="submit" class="btn secondary-btn">Save</button>
                        </div>
                        <p id="limit-alert" class="alert-msg"></p>
                    </form>
                </div>
            </div>

            <!-- Right Column: Analytics & List -->
            <div class="col-right">
                <div class="glass-card summary-card">
                    <h2>30-Day Spending</h2>
                    <h1 class="total-spend" id="total-spend">Rs.0.00</h1>
                    
                    <div class="bars">
                        <div class="bar-group">
                            <label>Needs (<span id="pct-need">0</span>%)</label>
                            <div class="progress-bg"><div class="progress-fill need-fill" id="bar-need"></div></div>
                        </div>
                        <div class="bar-group">
                            <label>Wants (<span id="pct-want">0</span>%)</label>
                            <div class="progress-bg"><div class="progress-fill want-fill" id="bar-want"></div></div>
                        </div>
                        <div class="bar-group">
                            <label>Investments (<span id="pct-invest">0</span>%)</label>
                            <div class="progress-bg"><div class="progress-fill invest-fill" id="bar-invest"></div></div>
                        </div>
                    </div>

                    <div id="insights-container" class="insights-list">
                        <!-- AI Insights load here -->
                    </div>
                </div>

                <div class="glass-card mt-4">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Spending Summary</h2>
                        <select id="summary-type" onchange="handleSummaryTypeChange()" style="padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid rgba(255,255,255,0.2); outline: none;">
                            <option value="daily" style="color: rgb(255, 255, 255);">Today</option>
                            <option value="monthly" style="color: rgb(255, 255, 255);">Last 30 Days</option>
                            <option value="custom" style="color: rgb(255, 255, 255);">Custom Range</option>
                        </select>
                    </div>
                    
                    <div id="custom-date-range" style="display: none; gap: 10px; margin-top: 15px; align-items: center;">
                        <input type="date" id="summary-start" style="padding: 8px; border-radius: 8px; border: none; outline: none;">
                        <span>to</span>
                        <input type="date" id="summary-end" style="padding: 8px; border-radius: 8px; border: none; outline: none;">
                        <button onclick="loadSummary()" class="btn secondary-btn" style="padding: 8px 15px;">Go</button>
                    </div>

                    <div style="margin-top: 20px; text-align: center;">
                        <h1 id="summary-total-display" style="font-size: 2.5rem; color: var(--primary);">Rs.0.00</h1>
                        <p id="summary-date-range" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;"></p>
                        
                        <div id="summary-categories" style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                            <!-- Category breakdown -->
                        </div>
                    </div>
                </div>

                <div class="glass-card mt-4">
                    <h2>Recent Expenses</h2>
                    <div class="expense-list" id="expense-list">
                        <!-- Expense items load here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
